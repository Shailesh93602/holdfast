# Render Blueprint — one connect provisions the web service + a Postgres DB,
# injects DATABASE_URL, and migrations run on boot. In Render: New → Blueprint
# → connect the `holdfast` repo → Apply.
services:
  - type: web
    name: holdfast
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: RUN_MIGRATIONS_ON_BOOT
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: holdfast-db
          property: connectionString

databases:
  - name: holdfast-db
    plan: free
